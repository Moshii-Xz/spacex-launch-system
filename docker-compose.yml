version: "3.9"

services:
  # ── DynamoDB local ──────────────────────────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: spacex-dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      # curl sale con código 7 si hay "connection refused".
      # Cualquier otro código (0 para 2xx, 22 para 4xx) significa que DynamoDB está listo.
      test: ["CMD-SHELL", "curl -s http://localhost:8000 > /dev/null 2>&1; [ $? -ne 7 ]"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 10s

  # ── Setup tabla DynamoDB local ──────────────────────────────────────────────
  dynamodb-setup:
    image: amazon/aws-cli:latest
    container_name: spacex-dynamodb-setup
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        aws dynamodb create-table \
          --table-name spacex-launches-dev \
          --attribute-definitions \
            AttributeName=launch_id,AttributeType=S \
            AttributeName=status,AttributeType=S \
            AttributeName=launch_date,AttributeType=S \
          --key-schema AttributeName=launch_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes \
            "[{\"IndexName\":\"status-index\",\"KeySchema\":[{\"AttributeName\":\"status\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}},{\"IndexName\":\"launch_date-index\",\"KeySchema\":[{\"AttributeName\":\"launch_date\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]" \
          --endpoint-url http://dynamodb-local:8000 \
        && echo "Tabla creada." || echo "Tabla ya existe, continuando..."

  # ── Backend FastAPI ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spacex-backend
    ports:
      - "8080:8000"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - DYNAMODB_TABLE=spacex-launches-dev
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - CORS_ORIGINS=http://localhost:3000
      - LOG_LEVEL=DEBUG
    depends_on:
      dynamodb-local:
        condition: service_healthy
      # Espera a que la tabla esté creada antes de arrancar
      dynamodb-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── WebApp React ────────────────────────────────────────────────────────────
  webapp:
    build:
      context: ./webapp
      target: builder
    container_name: spacex-webapp
    ports:
      - "3000:3000"
    volumes:
      - ./webapp/src:/app/src
    environment:
      # URL que usa el navegador (host:8080 → backend container:8000)
      - VITE_API_BASE_URL=http://localhost:8080/api/v1
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: spacex-network
